name: Update Works Manifest

on:
  push:
    paths:
      - "works/*.json"
      - ".github/workflows/update-works-manifest.yml"
      - "scripts/build-works-manifest.js"

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate works.json
        run: node scripts/build-works-manifest.js

      - name: Commit updated works.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add works.json
          git diff --cached --quiet || git commit -m "Update works manifest"
          git push
