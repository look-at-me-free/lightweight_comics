name: Repo Oversight Failsafe

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  oversight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4

      - name: Check date.txt age
        id: check
        shell: bash
        run: |
          set -e

          if [ ! -f date.txt ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_DATE="$(tr -d '\r\n' < date.txt)"
          FILE_TS=$(date -d "$FILE_DATE" +%s 2>/dev/null || echo 0)
          NOW_TS=$(date +%s)
          AGE_DAYS=$(( (NOW_TS - FILE_TS) / 86400 ))

          echo "File date: $FILE_DATE"
          echo "Age days: $AGE_DAYS"

          if [ "$FILE_TS" -eq 0 ] || [ "$AGE_DAYS" -ge 4 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Repo B
        if: steps.check.outputs.stale == 'true'
        uses: actions/checkout@v4
        with:
          repository: look-at-me-free/manga
          token: ${{ secrets.REPO_B_TOKEN }}
          path: repo_b

      - name: Copy Repo A into Repo B
        if: steps.check.outputs.stale == 'true'
        shell: bash
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ repo_b/

      - name: Commit and push changes
        if: steps.check.outputs.stale == 'true'
        shell: bash
        run: |
          cd repo_b

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Oversight failsafe sync from Repo A"
          git push
